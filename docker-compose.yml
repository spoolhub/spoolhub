services:
  spoolhub:
    image: ghcr.io/spoolhub/spoolhub:latest
    container_name: spoolhub
    restart: unless-stopped
    ports:
      - "4848:4848"
    volumes:
      - ./data:/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
