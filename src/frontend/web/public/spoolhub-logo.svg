<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="printerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="filamentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="50%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Main circle background -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)"/>

  <!-- Inner subtle ring -->
  <circle cx="100" cy="100" r="88" stroke="#ffffff" stroke-width="1" opacity="0.3"/>

  <!-- 3D Printer body (stylized, Bambu-style clean geometry) -->
  <!-- Base/platform -->
  <rect x="55" y="135" width="90" height="12" rx="3" fill="#1e293b" opacity="0.8"/>

  <!-- Vertical frame columns (left and right) -->
  <rect x="60" y="55" width="8" height="90" rx="4" fill="url(#printerGrad)"/>
  <rect x="132" y="55" width="8" height="90" rx="4" fill="url(#printerGrad)"/>

  <!-- Top horizontal bar (gantry) -->
  <rect x="55" y="50" width="90" height="10" rx="5" fill="url(#printerGrad)"/>

  <!-- Print head (extruder) -->
  <rect x="82" y="62" width="36" height="16" rx="4" fill="#1e293b"/>
  <circle cx="100" cy="78" r="5" fill="#0ea5e9"/>

  <!-- Spool holder (top right) -->
  <circle cx="75" y="45" r="8" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.7"/>
  <circle cx="75" y="45" r="3" fill="#0ea5e9"/>

  <!-- Filament line from spool to extruder -->
  <path d="M75 53 Q75 85 82 88" stroke="url(#filamentGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Build plate with grid lines -->
  <rect x="65" y="120" width="70" height="3" rx="1.5" fill="#334155"/>
  <line x1="70" y1="123" x2="70" y2="135" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <line x1="85" y1="123" x2="85" y2="135" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <line x1="100" y1="123" x2="100" y2="135" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <line x1="115" y1="123" x2="115" y2="135" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <line x1="130" y1="123" x2="130" y2="135" stroke="#334155" stroke-width="1" opacity="0.4"/>

  <!-- Small print object on plate (progress indicator) -->
  <rect x="85" y="108" width="30" height="12" rx="2" fill="#0ea5e9" opacity="0.6"/>

  <!-- "SH" text watermark -->
  <text x="155" y="42" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff" opacity="0.7">SH</text>
</svg>