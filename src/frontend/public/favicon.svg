<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <g id="spokes">
      <line x1="0" y1="-52" x2="0" y2="-34" stroke="white" stroke-width="4" opacity="0.5"/>
      <line x1="0" y1="-52" x2="0" y2="-34" stroke="white" stroke-width="4" opacity="0.5" transform="rotate(45)"/>
      <line x1="0" y1="-52" x2="0" y2="-34" stroke="white" stroke-width="4" opacity="0.5" transform="rotate(90)"/>
      <line x1="0" y1="-52" x2="0" y2="-34" stroke="white" stroke-width="4" opacity="0.5" transform="rotate(135)"/>
      <line x1="0" y1="-52" x2="0" y2="-34" stroke="white" stroke-width="4" opacity="0.5" transform="rotate(180)"/>
      <line x1="0" y1="-52" x2="0" y2="-34" stroke="white" stroke-width="4" opacity="0.5" transform="rotate(225)"/>
      <line x1="0" y1="-52" x2="0" y2="-34" stroke="white" stroke-width="4" opacity="0.5" transform="rotate(270)"/>
      <line x1="0" y1="-52" x2="0" y2="-34" stroke="white" stroke-width="4" opacity="0.5" transform="rotate(315)"/>
    </g>
  </defs>
  <rect width="100" height="100" rx="26" fill="#22c55e"/>
  <g transform="translate(50,50) scale(0.58)">
    <circle r="65" fill="none" stroke="white" stroke-width="5"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
      <circle r="53" fill="none" stroke="white" stroke-width="8" opacity="0.4"/>
      <circle r="43" fill="none" stroke="white" stroke-width="8" opacity="0.65"/>
      <circle r="33" fill="none" stroke="white" stroke-width="8" opacity="0.9"/>
      <use href="#spokes"/>
    </g>
    <circle r="17" fill="white"/>
    <circle r="9" fill="none" stroke="#22c55e" stroke-width="4" opacity="0.8"/>
  </g>
</svg>
