name: Discord PR Notification

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        uses: sarisia/actions-status-discord@v1
        if: github.event.pull_request.draft == false
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "🔔 New PR needs review"
          description: "#${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}"
          url: "${{ github.event.pull_request.html_url }}"
          color: 0x5865F2
          username: SpoolHub Bot
          avatar_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
          custom_fields: |
            [{"name": "Author", "value": "${{ github.event.pull_request.user.login }}", "inline": true},
             {"name": "Branch", "value": "${{ github.event.pull_request.head.ref }}", "inline": true}]
