name: CI

on:
  pull_request:
    branches:
      - master
      - develop
  push:
    branches:
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      ASPNETCORE_ENVIRONMENT: Production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: src/backend/**/*.csproj

      - name: Restore dependencies
        run: dotnet restore src/backend/backend.sln

      - name: Build
        run: dotnet build src/backend/backend.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test src/backend/backend.sln --no-build --configuration Release

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/frontend/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/frontend/web

      - name: Type-check and build
        run: npm run build
        working-directory: src/frontend/web

      - name: Lint
        run: npm run lint
        working-directory: src/frontend/web

      - name: Test
        run: npm test -- --run
        working-directory: src/frontend/web
