name: Agent Release

on:
  release:
    types: [published]

jobs:
  build-agent-installer:
    runs-on: windows-latest
    if: github.event.release.target_commitish == 'master'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish agent (self-contained, single file)
        run: >
          dotnet publish src/agent/SpoolHubAgent/SpoolHubAgent.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ github.event.release.tag_name }}
          -o src/agent/SpoolHubAgent/publish

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Compile installer
        run: iscc src/agent/installer.iss

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: src/agent/Output/SpoolHubAgent-Setup.exe
